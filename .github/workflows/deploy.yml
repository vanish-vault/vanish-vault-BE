name: CI/CD – Build & Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# ──────────────────────────────────────────────────────────────────
# Environment variables shared across jobs
# ──────────────────────────────────────────────────────────────────
env:
  IMAGE_NAME: vanish-vault-be
  REGISTRY: ghcr.io                          # GitHub Container Registry
  # Change to your Docker Hub user if you prefer:
  # REGISTRY: docker.io

# ──────────────────────────────────────────────────────────────────
# JOB 1 – Continuous Integration (lint + build check)
# ──────────────────────────────────────────────────────────────────
jobs:
  ci:
    name: 🔍 CI – Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile

      - name: 🔨 Compile TypeScript
        run: yarn build

  # ──────────────────────────────────────────────────────────────────
  # JOB 2 – Docker Build & Push  (only on push to main/master)
  # ──────────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker – Build & Push
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write       # required to push to GHCR

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Generate Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────
  # JOB 3 – Deploy  (only after image is pushed; main/master only)
  # Choose ONE of the deployment strategies below and remove the other.
  # ──────────────────────────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to Server
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    environment: production          # maps to a GitHub Environment with protection rules

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ── Strategy A: SSH into a self-hosted VPS / EC2 / DigitalOcean ──
      - name: 🔑 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            echo "🔐 Logging into Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            echo "📥 Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

            echo "♻️  Restarting container..."
            docker stop vanish-vault-be || true
            docker rm   vanish-vault-be || true

            docker run -d \
              --name vanish-vault-be \
              --restart unless-stopped \
              -p 4000:4000 \
              --env-file /opt/vanish-vault/.env \
              ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

            echo "✅ Deployment complete."

      # ── Strategy B: Render.com (uncomment if using Render) ──
      # - name: 🔄 Trigger Render deploy hook
      #   run: |
      #     curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      # ── Strategy C: Railway (uncomment if using Railway) ──
      # - name: 🚂 Deploy to Railway
      #   uses: railwayapp/github-action@v1
      #   with:
      #     railway-token: ${{ secrets.RAILWAY_TOKEN }}
