name: CI/CD – Build & Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# ──────────────────────────────────────────────────────────────────
# Environment variables shared across jobs
# ──────────────────────────────────────────────────────────────────
env:
  IMAGE_NAME: vanish-vault-be
  REGISTRY: ghcr.io                          # GitHub Container Registry
  # Change to your Docker Hub user if you prefer:
  # REGISTRY: docker.io

# ──────────────────────────────────────────────────────────────────
# JOB 1 – Continuous Integration (lint + build check)
# ──────────────────────────────────────────────────────────────────
jobs:
  ci:
    name: 🔍 CI – Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile

      - name: 🔨 Compile TypeScript
        run: yarn build

  # ──────────────────────────────────────────────────────────────────
  # JOB 2 – Docker Build & Push  (only on push to main/master)
  # ──────────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker – Build & Push
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write       # required to push to GHCR

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Generate Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────
  # JOB 3 – Deploy to Railway (only after CI passes; main/master only)
  # ──────────────────────────────────────────────────────────────────
  deploy:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🏗️ Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy to Railway
        run: railway upsert --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
